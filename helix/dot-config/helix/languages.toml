[[language]]
name = "python"
language-servers = ["ruff", "basedpyright"]
formatter = {command = "sh", args = ["-c","ruff check --fix - | ruff format -"]}

[[language]]
name = "typst"
language-servers = ["tinymist"]

[language-server.ruff]
command = "ruff"
args = ["server"]

[language-server.basedpyright]
command = "basedpyright-langserver"
args = ["--stdio"]

[language-server.basedpyright.config]
basedpyright.analysis.diagnosticMode = "openFilesOnly"

[lanuuage-server.tinymist]
command = "tinymist"

[lanuuage-server.tinymist.config]
tinymist.preview.background.enabled = true
tinymist.startDefaultPreview = true

[language-server.basedpyright.config.basedpyright.analysis.inlayHints]
variableTypes = true          
callArgumentNames = true      
functionReturnTypes = true    
genericTypes = true           
pytestParameters = true       
